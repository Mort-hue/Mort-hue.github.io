<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Memory Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --bg: #0f1b2d;
      --bg2: #162032;
      --accent: #f5a623;
      --accent2: #e74c3c;
      --green: #2ecc71;
      --text: #e8f0fe;
      --text-dim: #8aa0c0;
      --radius: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(30,80,160,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(245,166,35,0.08) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
    }

    /* Nav */
    nav {
      background: rgba(15,27,45,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--accent);
      padding: 10px 40px;
      display: flex;
      align-items: center;
      gap: 30px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    nav .nav-logo {
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-right: auto;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 20px 20px 10px;
    }
    .hero h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.05em;
      color: var(--accent);
      text-shadow: 3px 3px 0px rgba(231,76,60,0.5);
      line-height: 1;
    }
    .hero p {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-top: 4px;
      font-weight: 600;
    }

    /* Difficulty Selector */
    .difficulty-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 8px;
      flex-wrap: wrap;
    }
    .diff-btn {
      padding: 6px 22px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.82rem;
      cursor: pointer;
      border: 2px solid rgba(245,166,35,0.4);
      background: transparent;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .diff-btn:hover { border-color: var(--accent); color: var(--accent); }
    .diff-btn.active {
      background: var(--accent);
      color: #1a1a2e;
      border-color: var(--accent);
    }

    /* Section container */
    .section-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6px 20px 30px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stat-box {
      background: var(--bg2);
      border: 2px solid rgba(245,166,35,0.3);
      border-radius: var(--radius);
      padding: 4px 18px;
      text-align: center;
      min-width: 80px;
    }
    .stat-box .stat-num {
      font-family: 'Bangers', cursive;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      display: block;
    }
    .stat-box .stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    /* Game board */
    .game-board-wrapper {
      background: var(--bg2);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .game-grid {
      display: grid;
      gap: 6px;
      height: calc(100vh - 280px);
    }

    /* Cards */
    .card {
      perspective: 800px;
      cursor: pointer;
      min-height: 0;
      min-width: 0;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      border-radius: var(--radius);
    }
    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-back {
      background: linear-gradient(135deg, #1e3a5f, #0f2040);
      border: 2px solid rgba(245,166,35,0.4);
    }
    .card-back::after {
      content: '🌐';
      font-size: 1.2rem;
      opacity: 0.7;
    }
    .card-front {
      background: #fff;
      transform: rotateY(180deg);
      border: 2px solid rgba(0,0,0,0.1);
      padding: 3px;
    }
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
    }
    .card.matched .card-face.card-front {
      background: #e8f8ef;
      border-color: var(--green);
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 7px 22px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--accent); color: #1a1a2e; }
    .btn-danger { background: var(--accent2); color: #fff; }
    .btn-center {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* Win Banner */
    .win-banner {
      display: none;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #1a4a2a, #0f2a1a);
      border: 3px solid var(--green);
      border-radius: 14px;
      margin-bottom: 8px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .win-banner h2 {
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      color: var(--green);
      letter-spacing: 0.05em;
    }
    .win-banner p {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 4px;
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 999;
      pointer-events: none;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .stats-bar { gap: 10px; }
      nav { padding: 10px 16px; }
      .game-grid { height: auto; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">🌍 FlagMaster</span>
    <a href="index.html">Home</a>
    <a href="resume.html">Résumé</a>
    <a href="scratch.html">← Back</a>
  </nav>

  <div class="hero">
    <h1>🚩 Flag Memory</h1>
    <p>Match each country flag with its name — how fast can you clear the board?</p>
  </div>

  <!-- Difficulty selector -->
  <div class="difficulty-bar">
    <button class="diff-btn" onclick="setDifficulty('easy')">🟢 Easy (4×3)</button>
    <button class="diff-btn active" onclick="setDifficulty('medium')">🟡 Medium (6×4)</button>
    <button class="diff-btn" onclick="setDifficulty('hard')">🔴 Hard (6×6)</button>
  </div>

  <div class="section-container">

    <div class="win-banner" id="winBanner">
      <h2>🎉 You Won!</h2>
      <p id="winMsg">Amazing!</p>
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <span class="stat-num" id="movesDisplay">0</span>
        <span class="stat-label">Moves</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="matchesDisplay">0</span>
        <span class="stat-label">Matches</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="timerDisplay">0s</span>
        <span class="stat-label">Time</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="bestDisplay">--</span>
        <span class="stat-label">Best</span>
      </div>
    </div>

    <div class="game-board-wrapper">
      <div class="game-grid" id="gameGrid"></div>
      <div class="btn-center">
        <button class="btn btn-primary" onclick="startGame()">🔀 New Game</button>
        <button class="btn btn-danger" onclick="startGame()">↺ Reset</button>
      </div>
    </div>

  </div>

  <script>
    const ALL_FLAGS = [
      { id:1,  country:'United States', code:'us' },
      { id:2,  country:'Japan',         code:'jp' },
      { id:3,  country:'Brazil',        code:'br' },
      { id:4,  country:'Germany',       code:'de' },
      { id:5,  country:'France',        code:'fr' },
      { id:6,  country:'Canada',        code:'ca' },
      { id:7,  country:'Australia',     code:'au' },
      { id:8,  country:'India',         code:'in' },
      { id:9,  country:'Mexico',        code:'mx' },
      { id:10, country:'Italy',         code:'it' },
      { id:11, country:'Spain',         code:'es' },
      { id:12, country:'South Korea',   code:'kr' },
      { id:13, country:'Argentina',     code:'ar' },
      { id:14, country:'Nigeria',       code:'ng' },
      { id:15, country:'Egypt',         code:'eg' },
      { id:16, country:'Turkey',        code:'tr' },
      { id:17, country:'Portugal',      code:'pt' },
      { id:18, country:'Sweden',        code:'se' },
    ];

    const DIFFICULTIES = {
      easy:   { pairs: 6,  cols: 4, rows: 3 },
      medium: { pairs: 12, cols: 6, rows: 4 },
      hard:   { pairs: 18, cols: 6, rows: 6 },
    };

    let difficulty = 'medium';
    let flipped = [], matched = [], moves = 0, locked = false;
    let timerInterval = null, seconds = 0;
    let currentFlags = [];

    function getBestKey() { return 'flagBest_' + difficulty; }
    function getHistoryKey() { return 'flagHistory_' + difficulty; }

    function updateBestDisplay() {
      const best = localStorage.getItem(getBestKey());
      document.getElementById('bestDisplay').textContent = best ? best + 's' : '--';
    }

    function setDifficulty(d) {
      difficulty = d;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      updateBestDisplay();
      startGame();
    }

    function flagUrl(code) { return `https://flagcdn.com/w160/${code}.png`; }
    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function buildCards() {
      const { pairs } = DIFFICULTIES[difficulty];
      currentFlags = shuffle(ALL_FLAGS).slice(0, pairs);
      const cards = [];
      currentFlags.forEach(f => {
        cards.push({ pairId: f.id, type: 'flag', country: f.country, code: f.code });
        cards.push({ pairId: f.id, type: 'name', country: f.country, code: f.code });
      });
      return shuffle(cards);
    }

    function renderGrid(cards) {
      const { cols, rows } = DIFFICULTIES[difficulty];
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

      cards.forEach(card => {
        const el = document.createElement('div');
        el.className = 'card';
        const inner = document.createElement('div');
        inner.className = 'card-inner';
        const back = document.createElement('div');
        back.className = 'card-face card-back';
        const front = document.createElement('div');
        front.className = 'card-face card-front';

        if (card.type === 'flag') {
          const img = document.createElement('img');
          img.src = flagUrl(card.code);
          img.alt = card.country + ' flag';
          img.loading = 'lazy';
          front.appendChild(img);
        } else {
          const label = document.createElement('div');
          label.style.cssText = 'font-size:clamp(0.7rem,1.6vw,1.05rem);padding:8px;color:#1a1a2e;font-weight:800;text-align:center;line-height:1.2;font-family:Nunito,sans-serif;';
          label.textContent = card.country;
          front.appendChild(label);
        }

        inner.appendChild(back);
        inner.appendChild(front);
        el.appendChild(inner);
        el.addEventListener('click', () => onCardClick(el, card));
        grid.appendChild(el);
      });
    }

    function onCardClick(el, card) {
      if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      if (!timerInterval) startTimer();
      el.classList.add('flipped');
      flipped.push({ el, card });
      if (flipped.length === 2) { locked = true; moves++; document.getElementById('movesDisplay').textContent = moves; checkMatch(); }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.card.pairId === b.card.pairId && a.card.type !== b.card.type) {
        setTimeout(() => {
          a.el.classList.add('matched');
          b.el.classList.add('matched');
          matched.push(a.card.pairId);
          document.getElementById('matchesDisplay').textContent = matched.length;
          flipped = []; locked = false;
          if (matched.length === currentFlags.length) onWin();
        }, 400);
      } else {
        setTimeout(() => {
          a.el.classList.remove('flipped');
          b.el.classList.remove('flipped');
          flipped = []; locked = false;
        }, 1000);
      }
    }

    function startTimer() {
      seconds = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timerDisplay').textContent = seconds + 's';
      }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

    function saveScore() {
      const best = localStorage.getItem(getBestKey());
      if (!best || seconds < parseInt(best)) {
        localStorage.setItem(getBestKey(), seconds);
        updateBestDisplay();
      }
      let history = JSON.parse(localStorage.getItem(getHistoryKey()) || '[]');
      history.unshift({ time: seconds, moves, date: new Date().toLocaleDateString() });
      if (history.length > 3) history = history.slice(0, 3);
      localStorage.setItem(getHistoryKey(), JSON.stringify(history));
    }

    function launchConfetti() {
      const colors = ['#f5a623','#2ecc71','#e74c3c','#3498db','#9b59b6','#fff'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        piece.style.width = (Math.random() * 8 + 6) + 'px';
        piece.style.height = (Math.random() * 8 + 6) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }

    function onWin() {
      stopTimer();
      saveScore();
      launchConfetti();
      const banner = document.getElementById('winBanner');
      banner.style.display = 'block';
      const diffLabel = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
      document.getElementById('winMsg').textContent =
        `${diffLabel} mode — ${moves} moves in ${seconds} seconds! 🌍`;
      banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function startGame() {
      document.getElementById('winBanner').style.display = 'none';
      flipped = []; matched = []; moves = 0; locked = false;
      stopTimer(); seconds = 0;
      document.getElementById('movesDisplay').textContent = '0';
      document.getElementById('matchesDisplay').textContent = '0';
      document.getElementById('timerDisplay').textContent = '0s';
      updateBestDisplay();
      renderGrid(buildCards());
    }

    startGame();
  </script>

</body>
</html>
