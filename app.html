<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Memory Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap');

/* --- CSS Variables --- */
:root {
  --bg: #0f1b2d;
  --bg2: #162032;
  --accent: #f5a623;
  --accent2: #e74c3c;
  --green: #2ecc71;
  --text: #e8f0fe;
  --text-dim: #8aa0c0;
  --radius: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* --- Base Styles --- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Nunito', sans-serif;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(30, 80, 160, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(245, 166, 35, 0.08) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
}

/* --- Nav --- */
nav {
  background: rgba(15, 27, 45, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--accent);
  padding: 10px 40px;
  display: flex;
  align-items: center;
  gap: 30px;
  position: sticky;
  top: 0;
  z-index: 100;
}

nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.2s;
}

nav a:hover {
  color: var(--accent);
}

nav .nav-logo {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-right: auto;
}

/* --- Hero Section --- */
.hero {
  text-align: center;
  padding: 12px 20px 8px;
}

.hero h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(1.8rem, 4vw, 3rem);
  letter-spacing: 0.05em;
  color: var(--accent);
  text-shadow: 3px 3px 0px rgba(231, 76, 60, 0.5);
  line-height: 1;
}

.hero p {
  font-size: 0.88rem;
  color: var(--text-dim);
  margin-top: 3px;
  font-weight: 600;
}

/* --- Section Divs for Layout --- */
.section-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 6px 20px 30px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.stat-box {
  background: var(--bg2);
  border: 2px solid rgba(245, 166, 35, 0.3);
  border-radius: var(--radius);
  padding: 4px 18px;
  text-align: center;
  min-width: 80px;
}

.stat-box .stat-num {
  font-family: 'Bangers', cursive;
  font-size: 1.3rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  display: block;
}

.stat-box .stat-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
}

/* --- Game Board Div --- */
.game-board-wrapper {
  background: var(--bg2);
  border-radius: 14px;
  padding: 10px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.06);
}

/* --- Game Grid --- */
.game-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 6px;
  height: calc(100vh - 210px);
}

/* --- Cards --- */
.card {
  perspective: 800px;
  cursor: pointer;
  min-height: 0;
  min-width: 0;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: var(--radius);
}

.card.flipped .card-inner,
.card.matched .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Card Back */
.card-back {
  background: linear-gradient(135deg, #1e3a5f, #0f2040);
  border: 2px solid rgba(245, 166, 35, 0.4);
}

.card-back::after {
  content: '🌐';
  font-size: 1.2rem;
  opacity: 0.7;
}

/* Card Front */
.card-front {
  background: #fff;
  transform: rotateY(180deg);
  border: 2px solid rgba(0,0,0,0.1);
  padding: 3px;
}

.card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* Matched state */
.card.matched .card-face.card-front {
  background: #e8f8ef;
  border-color: var(--green);
}

/* --- Buttons --- */
.btn {
  display: inline-block;
  padding: 7px 22px;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.85rem;
  cursor: pointer;
  border: none;
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.btn:active {
  transform: translateY(0);
}

.btn-primary {
  background: var(--accent);
  color: #1a1a2e;
}

.btn-danger {
  background: var(--accent2);
  color: #fff;
}

.btn-center {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
}

/* --- Win Banner --- */
.win-banner {
  display: none;
  text-align: center;
  padding: 16px;
  background: linear-gradient(135deg, #1a4a2a, #0f2a1a);
  border: 3px solid var(--green);
  border-radius: 14px;
  margin-bottom: 8px;
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.win-banner h2 {
  font-family: 'Bangers', cursive;
  font-size: 2rem;
  color: var(--green);
  letter-spacing: 0.05em;
}

.win-banner p {
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-top: 4px;
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* --- How to Play Section --- */
.how-to-play {
  background: var(--bg2);
  border-radius: 20px;
  padding: 36px;
  margin-top: 40px;
  border: 1px solid rgba(255,255,255,0.06);
}

.how-to-play h2 {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 20px;
}

/* Ordered list with embedded unordered list (requirement) */
.how-to-play ol {
  padding-left: 24px;
  color: var(--text);
  line-height: 2;
  font-weight: 600;
}

.how-to-play ul {
  padding-left: 24px;
  margin-top: 6px;
  color: var(--text-dim);
  font-weight: 400;
  line-height: 1.8;
}

.how-to-play ul li {
  list-style-type: disc;
}

/* --- Anchor link target --- */
.anchor-target {
  scroll-margin-top: 80px;
}

/* --- Tableau Section Div --- */
.tableau-section {
  margin-top: 40px;
  background: var(--bg2);
  border-radius: 20px;
  padding: 36px;
  border: 1px solid rgba(255,255,255,0.06);
}

.tableau-section h2 {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.tableau-section p {
  color: var(--text-dim);
  margin-bottom: 24px;
  font-weight: 600;
}

.tableau-embed {
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

/* --- YouTube Section --- */
.video-section {
  margin-top: 40px;
  background: var(--bg2);
  border-radius: 20px;
  padding: 36px;
  border: 1px solid rgba(255,255,255,0.06);
}

.video-section h2 {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.video-section p {
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 20px;
}

.video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 12px;
}

.video-wrapper iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
  border-radius: 12px;
}

/* --- Footer --- */
footer {
  text-align: center;
  padding: 30px;
  color: var(--text-dim);
  font-size: 0.85rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 60px;
}

/* --- Responsive --- */
@media (max-width: 700px) {
  .game-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    height: auto;
  }
  .stats-bar {
    gap: 10px;
  }
  nav {
    padding: 10px 16px;
  }
}
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 10px 0;
    }
    .back-btn:hover { color: var(--accent); }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">🌍 FlagMaster</span>
    <a href="index.html">Home</a>
    <a href="resume.html">Résumé</a>
    <a href="scratch.html">Back to Scratch</a>
  </nav>

  <div class="hero">
    <h1>🚩 Flag Memory</h1>
    <p>Match each country flag with its name — how fast can you clear the board?</p>
  </div>

  <div class="section-container">

    <div class="win-banner" id="winBanner">
      <h2>🎉 You Won!</h2>
      <p id="winMsg">Amazing! You matched all flags!</p>
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <span class="stat-num" id="movesDisplay">0</span>
        <span class="stat-label">Moves</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="matchesDisplay">0</span>
        <span class="stat-label">Matches</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="timerDisplay">0s</span>
        <span class="stat-label">Time</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="bestDisplay">--</span>
        <span class="stat-label">Best</span>
      </div>
    </div>

    <div class="game-board-wrapper">
      <div class="game-grid" id="gameGrid"></div>
      <div class="btn-center">
        <button class="btn btn-primary" onclick="startGame()">🔀 New Game</button>
        <button class="btn btn-danger" onclick="resetBoard()">↺ Reset</button>
      </div>
    </div>

  </div>

  <script>
    const FLAGS = [
      { id: 1,  country: 'United States', code: 'us' },
      { id: 2,  country: 'Japan',         code: 'jp' },
      { id: 3,  country: 'Brazil',        code: 'br' },
      { id: 4,  country: 'Germany',       code: 'de' },
      { id: 5,  country: 'France',        code: 'fr' },
      { id: 6,  country: 'Canada',        code: 'ca' },
      { id: 7,  country: 'Australia',     code: 'au' },
      { id: 8,  country: 'India',         code: 'in' },
      { id: 9,  country: 'Mexico',        code: 'mx' },
      { id: 10, country: 'Italy',         code: 'it' },
      { id: 11, country: 'Spain',         code: 'es' },
      { id: 12, country: 'South Korea',   code: 'kr' },
      { id: 13, country: 'Argentina',     code: 'ar' },
      { id: 14, country: 'Nigeria',       code: 'ng' },
      { id: 15, country: 'Egypt',         code: 'eg' },
      { id: 16, country: 'Turkey',        code: 'tr' },
      { id: 17, country: 'Portugal',      code: 'pt' },
      { id: 18, country: 'Sweden',        code: 'se' },
    ];

    let flipped = [], matched = [], moves = 0, locked = false;
    let timerInterval = null, seconds = 0;

    // Load best time from localStorage
    let bestTime = localStorage.getItem('flagBestTime') ? parseInt(localStorage.getItem('flagBestTime')) : null;
    if (bestTime !== null) document.getElementById('bestDisplay').textContent = bestTime + 's';

    function flagUrl(code) { return `https://flagcdn.com/w160/${code}.png`; }
    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function buildCards() {
      const cards = [];
      FLAGS.forEach(f => {
        cards.push({ pairId: f.id, type: 'flag', country: f.country, code: f.code });
        cards.push({ pairId: f.id, type: 'name', country: f.country, code: f.code });
      });
      return shuffle(cards);
    }

    function renderGrid(cards) {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      cards.forEach((card, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        const inner = document.createElement('div');
        inner.className = 'card-inner';
        const back = document.createElement('div');
        back.className = 'card-face card-back';
        const front = document.createElement('div');
        front.className = 'card-face card-front';

        if (card.type === 'flag') {
          const img = document.createElement('img');
          img.src = flagUrl(card.code);
          img.alt = card.country + ' flag';
          img.loading = 'lazy';
          front.appendChild(img);
        } else {
          const label = document.createElement('div');
          label.style.fontSize = 'clamp(0.7rem, 1.6vw, 1.05rem)';
          label.style.padding = '8px';
          label.style.color = '#1a1a2e';
          label.style.fontWeight = '800';
          label.style.textAlign = 'center';
          label.style.lineHeight = '1.2';
          label.textContent = card.country;
          front.appendChild(label);
        }

        inner.appendChild(back);
        inner.appendChild(front);
        el.appendChild(inner);
        el.addEventListener('click', () => onCardClick(el, card));
        grid.appendChild(el);
      });
    }

    function onCardClick(el, card) {
      if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      if (!timerInterval) startTimer();
      el.classList.add('flipped');
      flipped.push({ el, card });
      if (flipped.length === 2) { locked = true; moves++; document.getElementById('movesDisplay').textContent = moves; checkMatch(); }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.card.pairId === b.card.pairId && a.card.type !== b.card.type) {
        setTimeout(() => {
          a.el.classList.add('matched');
          b.el.classList.add('matched');
          matched.push(a.card.pairId);
          document.getElementById('matchesDisplay').textContent = matched.length;
          flipped = []; locked = false;
          if (matched.length === FLAGS.length) onWin();
        }, 400);
      } else {
        setTimeout(() => {
          a.el.classList.remove('flipped');
          b.el.classList.remove('flipped');
          flipped = []; locked = false;
        }, 1000);
      }
    }

    function startTimer() {
      seconds = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timerDisplay').textContent = seconds + 's';
      }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

    function saveScore(time, moves) {
      // Save best time
      if (bestTime === null || time < bestTime) {
        bestTime = time;
        localStorage.setItem('flagBestTime', bestTime);
        document.getElementById('bestDisplay').textContent = bestTime + 's';
      }
      // Save last 3 attempts
      let history = JSON.parse(localStorage.getItem('flagHistory') || '[]');
      history.unshift({ time, moves, date: new Date().toLocaleDateString() });
      if (history.length > 3) history = history.slice(0, 3);
      localStorage.setItem('flagHistory', JSON.stringify(history));
    }

    function onWin() {
      stopTimer();
      saveScore(seconds, moves);
      const banner = document.getElementById('winBanner');
      banner.style.display = 'block';
      document.getElementById('winMsg').textContent =
        `You matched all 18 flags in ${moves} moves and ${seconds} seconds! 🌍`;
      banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function startGame() {
      document.getElementById('winBanner').style.display = 'none';
      flipped = []; matched = []; moves = 0; locked = false;
      stopTimer(); seconds = 0;
      document.getElementById('movesDisplay').textContent = '0';
      document.getElementById('matchesDisplay').textContent = '0';
      document.getElementById('timerDisplay').textContent = '0s';
      renderGrid(buildCards());
    }

    function resetBoard() { startGame(); }

    startGame();
  </script>

</body>
</html>
